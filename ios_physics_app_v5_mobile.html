        // 从 timeSlot 中提取纯时间部分（去掉"早读"、"A段"等名称前缀）
        function extractTimeOnly(timeSlot) {
            if (!timeSlot) return '-';
            // 匹配时间格式，如 7:30-8:00、08:00~10:00、14:00-16:30 等
            const match = timeSlot.match(/\d{1,2}:\d{2}[\-~]\d{1,2}:\d{2}/);
            return match ? match[0] : timeSlot;
        }

        function renderAttendance() {
            const student = getCurrentStudent();
            if (!student) return;
            
            const container = document.getElementById('attendanceCards');
            
            if (student.attendance_records.length === 0) {
                container.innerHTML = '<div class="module-card"><p class="text-gray-500 text-center py-8">暂无出勤记录</p></div>';
                return;
            }
            
            // 按季度和月份分组
            const sorted = student.attendance_records.sort((a, b) => new Date(b.date) - new Date(a.date));
            const groups = {};
            sorted.forEach(r => {
                const d = new Date(r.date);
                const year = d.getFullYear();
                const month = d.getMonth();
                const quarter = Math.floor(month / 3) + 1;
                const qKey = `${year}年Q${quarter}`;
                const mKey = `${year}-${String(month + 1).padStart(2, '0')}`;
                if (!groups[qKey]) groups[qKey] = {};
                if (!groups[qKey][mKey]) groups[qKey][mKey] = [];
                groups[qKey][mKey].push(r);
            });
            
            const quarterColors = { 'Q1': '#333', 'Q2': '#555', 'Q3': '#777', 'Q4': '#999' };
            const monthNames = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
            
            let html = '';
            Object.entries(groups).forEach(([qKey, months]) => {
                const qMatch = qKey.match(/Q(\d)/);
                const qColor = qMatch ? quarterColors['Q' + qMatch[1]] : '#333';
                html += `<div class="module-card">
                    <div class="module-header">
                        <span class="card-title" style="border-bottom:none;font-size:16px;font-weight:bold;color:${qColor};">${qKey}</span>
                    </div>`;
                Object.entries(months).forEach(([mKey, records]) => {
                    const mDate = new Date(mKey + '-01');
                    const mName = monthNames[mDate.getMonth()];
                    const total = records.length;
                    const present = records.filter(r => r.status === '出勤' || r.status === '迟到').length;
                    const absent = records.filter(r => r.status === '请假' || r.status === '旷课').length;
                    let statsText = `排课${total}次`;
                    if (total > 0) {
                        statsText += `，出勤${present}次`;
                        if (absent > 0) statsText += `，缺勤${absent}次`;
                    }
                    const hasFeedback = records.some(r => r.feedback);
                    html += `<div style="margin:12px 0;">
                        <div style="font-size:14px;font-weight:bold;color:#333;padding:6px 0;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center;">
                            <span>${mName}（${statsText}）</span>
                        </div>
                        ${records.map(r => {
                            const feedback = r.feedback || '';
                            return `<div class="knowledge-item">
                            <div style="flex:1;display:flex;align-items:center;gap:12px;font-size:14px;min-width:0;overflow:hidden;">
                                <span style="color:#333;min-width:80px;flex-shrink:0;">${r.date}</span>
                                <span style="color:#666;min-width:80px;display:inline-flex;align-items:center;height:20px;flex-shrink:0;">${extractTimeOnly(r.timeSlot)}</span>
                                <span class="level-badge" style="background-color:${r.status === '出勤' ? '#4caf50' : r.status === '迟到' ? '#2196f3' : r.status === '请假' ? '#ff9800' : '#f44336'};color:#fff;flex-shrink:0;">${r.status}</span>
                                <span style="color:#333;min-width:60px;flex-shrink:0;">${r.topic || '-'}</span>
                                ${feedback ? `<span style="color:#999;font-size:13px;cursor:pointer;display:inline-block;max-width:none;overflow:visible;text-overflow:clip;white-space:normal;flex-shrink:0;" onclick="toggleFeedback(${r.id})" id="fb${r.id}" title="点击收起">${feedback}</span>` : ''}
                            </div>
                            <div class="knowledge-delete" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);display:flex;gap:8px;">
                                <span style="cursor:pointer;color:#333;font-size:13px;" onclick="editAttendance(${r.id})">编辑</span>
                                <span style="cursor:pointer;color:#c62828;font-size:13px;" onclick="deleteAttendance(${r.id})">删除</span>
                            </div>
                        </div>`;
                        }).join('')}
                    </div>`;
                });
                html += '</div>';
            });
            
            container.innerHTML = html;
            // 应用视图状态
            container.style.gridTemplateColumns = attendanceViewSingle ? '1fr' : 'repeat(2, 1fr)';
            document.getElementById('attendanceViewBtn').textContent = attendanceViewSingle ? '2列' : '1列';
        }
        
        // 展开/收起学情反馈
        function toggleFeedback(recordId) {
            const student = getCurrentStudent();
            const record = student.attendance_records.find(r => r.id === recordId);
            if (!record || !record.feedback) return;
            
            const el = document.getElementById('fb' + recordId);
            const feedback = record.feedback;
            
            if (el.dataset.expanded === 'true') {
                // 收起
                el.innerHTML = feedback;
                el.style.whiteSpace = 'nowrap';
                el.style.maxWidth = '300px';
                el.style.overflow = 'hidden';
                el.style.textOverflow = 'ellipsis';
                el.title = '点击展开';
                el.dataset.expanded = 'false';
            } else {
                // 展开
                el.innerHTML = feedback;
                el.style.whiteSpace = 'normal';
                el.style.maxWidth = 'none';
                el.style.overflow = 'visible';
                el.style.textOverflow = 'clip';
                el.title = '点击收起';
                el.dataset.expanded = 'true';
            }
        }
        
        // 一键展开/收起某月所有反馈

            const student = getCurrentStudent();

                const d = new Date(r.date);
                const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
                return key === mKey && r.feedback;
            });
            
            // 判断是否全部已展开
            const allExpanded = monthRecords.every(r => {
                const el = document.getElementById('fb' + r.id);
                return el && el.dataset.expanded === 'true';
            });
            
            monthRecords.forEach(r => {
                const el = document.getElementById('fb' + r.id);
                if (!el) return;
                
                if (allExpanded) {

                    el.style.maxWidth = '300px';
                    el.style.overflow = 'hidden';
                    el.style.textOverflow = 'ellipsis';
                    el.title = '点击展开';
                    el.dataset.expanded = 'false';
                } else {
                    // 展开

                    el.style.maxWidth = 'none';
                    el.style.overflow = 'visible';
                    el.style.textOverflow = 'clip';
                    el.title = '点击收起';

        // 渲染作业记录
        function renderHomework() {
            const student = getCurrentStudent();
            if (!student) return;
            
            const container = document.getElementById('homeworkCards');
            
            if (student.homework_records.length === 0) {
                container.innerHTML = '<div class="col-span-2 text-center text-gray-500 py-8">暂无记录</div>';
                return;
            }
            
            // 按季度和月份分组（兼容旧数据：缺少date/topic/completed字段时用assignDate/content/status替代）
            student.homework_records.forEach(r => {
                if (!r.date && r.assignDate) r.date = r.assignDate;
                if (!r.topic && r.content) r.topic = r.content;
                if (!r.completed && r.status) r.completed = r.status;
            });
            const sorted = student.homework_records.sort((a, b) => new Date(b.date) - new Date(a.date));
            const groups = {};
            sorted.forEach(r => {
                const d = new Date(r.date);
                const year = d.getFullYear();
                const month = d.getMonth();
                const quarter = Math.floor(month / 3) + 1;
                const qKey = `${year}年Q${quarter}`;
                const mKey = `${year}-${String(month + 1).padStart(2, '0')}`;
                if (!groups[qKey]) groups[qKey] = {};
                if (!groups[qKey][mKey]) groups[qKey][mKey] = [];
                groups[qKey][mKey].push(r);
            });
            
            const quarterColors = { 'Q1': '#333', 'Q2': '#555', 'Q3': '#777', 'Q4': '#999' };
            const monthNames = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
            
            let html = '';
            Object.entries(groups).forEach(([qKey, months]) => {
                const qMatch = qKey.match(/Q(\d)/);
                const qColor = qMatch ? quarterColors['Q' + qMatch[1]] : '#333';
                html += `<div class="module-card">
                    <div class="module-header">
                        <span class="card-title" style="border-bottom:none;font-size:16px;font-weight:bold;color:${qColor};">${qKey}</span>
                    </div>`;
                Object.entries(months).forEach(([mKey, records]) => {
                    const mDate = new Date(mKey + '-01');
                    const mName = monthNames[mDate.getMonth()];
                    const total = records.length;
                    const completed = records.filter(r => r.completed === '已完成').length;
                    const notCompleted = total - completed;
                    let statsText = `作业共${total}次`;
                    if (total > 0) {
                        statsText += `，完成${completed}次`;
                        if (notCompleted > 0) statsText += `，未完成${notCompleted}次`;
                    }
                    const hasEval = records.some(r => r.evaluation);
                    html += `<div style="margin:12px 0;">
                        <div style="font-size:14px;font-weight:bold;color:#333;padding:6px 0;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center;">
                            <span>${mName}（${statsText}）</span>
                        </div>
                        ${records.map((r, idx) => {
                            // 计算本月第几次作业（按日期升序，日期靠前为第1次）
                            const monthRecords = records.filter(rec => {
                                const rd = new Date(rec.date);
                                const cd = new Date(r.date);
                                return rd.getFullYear() === cd.getFullYear() && rd.getMonth() === cd.getMonth();
                            }).sort((a, b) => new Date(a.date) - new Date(b.date)); // 按日期升序排序
                            const monthIndex = monthRecords.findIndex(rec => rec.id === r.id) + 1;
                            return `<div class="knowledge-item">
                            <div style="flex:1;display:flex;align-items:center;gap:12px;font-size:14px;min-width:0;overflow:hidden;">
                                <span style="color:#333;min-width:80px;flex-shrink:0;">${r.date}</span>
                                <span style="color:#333;font-size:14px;min-width:50px;flex-shrink:0;">第${monthIndex}次</span>
                                <select onchange="quickUpdateHomework(${r.id},'completed',this.value)" style="font-size:13px;padding:2px 6px;border-radius:12px;border:none;color:#fff;background-color:${r.completed === '已完成' ? '#4caf50' : r.completed === '部分完成' ? '#81c784' : r.completed === '进行中' ? '#2196f3' : '#f44336'};cursor:pointer;flex-shrink:0;">
                                    <option value="已完成" ${r.completed === '已完成' ? 'selected' : ''} style="color:#333;">已完成</option>
                                    <option value="部分完成" ${r.completed === '部分完成' ? 'selected' : ''} style="color:#333;">部分完成</option>
                                    <option value="进行中" ${r.completed === '进行中' ? 'selected' : ''} style="color:#333;">进行中</option>
                                    <option value="未完成" ${r.completed === '未完成' ? 'selected' : ''} style="color:#333;">未完成</option>
                                </select>
                                <span style="color:#333;min-width:60px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${r.topic || '-'}</span>
                                ${r.evaluation ? `<span style="color:#999;font-size:13px;cursor:pointer;display:inline-block;max-width:none;overflow:visible;text-overflow:clip;white-space:normal;flex-shrink:0;" onclick="toggleHomeworkEval(${r.id})" id="he${r.id}" title="点击收起">${r.evaluation}</span>` : ''}
                            </div>
                            <div class="knowledge-delete" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);display:flex;gap:8px;">
                                <span style="cursor:pointer;color:#333;font-size:13px;" onclick="editHomework(${r.id})">编辑</span>
                                <span style="cursor:pointer;color:#c62828;font-size:13px;" onclick="deleteHomework(${r.id})">删除</span>
                            </div>
                        </div>`;
                        }).join('')}
                    </div>`;
                });
                html += '</div>';
            });
            
            container.innerHTML = html;
            // 应用视图状态
            container.style.gridTemplateColumns = homeworkViewSingle ? '1fr' : 'repeat(2, 1fr)';
            document.getElementById('homeworkViewBtn').textContent = homeworkViewSingle ? '2列' : '1列';
        }

        // ==================== PDF导出相关函数 ====================

        // 辅助函数：根据年份和季度获取日期范围
        function getQuarterDateRange(year, quarter) {
            const startMonth = (quarter - 1) * 3;
            const startDate = new Date(year, startMonth, 1);
            const endDate = new Date(year, startMonth + 3, 0, 23, 59, 59);
            return { startDate, endDate };
        }

        // 辅助函数：根据年份和季度列表筛选记录
        function filterRecordsByQuarters(records, dateField, year, quarters) {
            if (!records || records.length === 0) return [];
            return records.filter(r => {
                const d = new Date(r[dateField]);
                return quarters.some(q => {
                    const range = getQuarterDateRange(year, q);
                    return d >= range.startDate && d <= range.endDate;
                });
            });
        }

        // 辅助函数：获取记录中所有涉及的年份
        function getAvailableYears(records, dateField) {
            if (!records || records.length === 0) return [new Date().getFullYear()];
            const years = new Set();
            records.forEach(r => {
                if (r[dateField]) years.add(new Date(r[dateField]).getFullYear());
            });
            const arr = Array.from(years).sort((a, b) => b - a);
            if (arr.length === 0) arr.push(new Date().getFullYear());
            return arr;
        }

        // 辅助函数：在临时canvas上绘制雷达图并返回dataURL
        function drawRadarChartForPDF(moduleNames, moduleScores, width, height) {
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            const padding = 80;
            const centerX = width / 2;
            const centerY = height / 2;
            const maxRadius = Math.min(centerX, centerY) - padding;
            const n = moduleNames.length;
            if (n < 3) return canvas.toDataURL('image/png');

            // 背景
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, width, height);

            const angleStep = (2 * Math.PI) / n;
            const levels = 5;

            // 绘制网格
            ctx.strokeStyle = '#ddd';
            ctx.lineWidth = 0.5;
            for (let lv = 1; lv <= levels; lv++) {
                const r = (maxRadius / levels) * lv;
                ctx.beginPath();
                for (let i = 0; i <= n; i++) {
                    const angle = i * angleStep - Math.PI / 2;
                    const x = centerX + r * Math.cos(angle);
                    const y = centerY + r * Math.sin(angle);
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();
            }

            // 绘制轴线
            ctx.strokeStyle = '#ccc';
            ctx.lineWidth = 0.5;
            for (let i = 0; i < n; i++) {
                const angle = i * angleStep - Math.PI / 2;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(centerX + maxRadius * Math.cos(angle), centerY + maxRadius * Math.sin(angle));
                ctx.stroke();
            }

            // 绘制数据区域
            ctx.fillStyle = 'rgba(0,0,0,0.08)';
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            for (let i = 0; i <= n; i++) {
                const idx = i % n;
                const angle = idx * angleStep - Math.PI / 2;
                const val = (moduleScores[idx] || 0) / 100;
                const r = maxRadius * val;
                const x = centerX + r * Math.cos(angle);
                const y = centerY + r * Math.sin(angle);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // 绘制数据点
            ctx.fillStyle = '#333';
            for (let i = 0; i < n; i++) {
                const angle = i * angleStep - Math.PI / 2;
                const val = (moduleScores[i] || 0) / 100;
                const r = maxRadius * val;
                const x = centerX + r * Math.cos(angle);
                const y = centerY + r * Math.sin(angle);
                ctx.beginPath();
                ctx.arc(x, y, 3, 0, 2 * Math.PI);
                ctx.fill();
            }

            // 绘制标签
            ctx.fillStyle = '#333';
            ctx.font = 'bold 36px Microsoft YaHei, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            for (let i = 0; i < n; i++) {
                const angle = i * angleStep - Math.PI / 2;
                const labelR = maxRadius + 80;
                let x = centerX + labelR * Math.cos(angle);
                let y = centerY + labelR * Math.sin(angle);
                // 确保标签不超出canvas边界
                x = Math.max(160, Math.min(width - 160, x));
                y = Math.max(120, Math.min(height - 120, y));
                ctx.fillText(moduleNames[i], x, y);
            }

            return canvas.toDataURL('image/png');
        }

                }
            } catch (e) {}
            return null;
        }

        // 生成PDF（使用打印窗口方案，文字为主，完美支持中文）
        function generatePDF() {
            const student = getCurrentStudent();
            if (!student) return;

            const includeKnowledge = document.getElementById('pdfKnowledge').checked;
            const includeStudyPlans = document.getElementById('pdfStudyPlans').checked;
            const includeAttendance = document.getElementById('pdfAttendance').checked;

            closeModal();

                if (window.homeworkChart) hwChartImg = window.homeworkChart.toBase64Image();
                if (window.scoreChart_score) scChartImg = window.scoreChart_score.toBase64Image();

            // 截取成绩走势的3个视图（成绩、班排、年排）
            let scoreScoreImg = '', scoreClassRankImg = '', scoreGradeRankImg = '';
            if (includeCharts) {
                const scRecords = student.score_records.sort((a, b) => new Date(a.date) - new Date(b.date));

                if (scRecords.length > 0) {

                    const scoreCanvas = document.createElement('canvas');

                    new Chart(scoreCanvas.getContext('2d'), {

                    });

                    // 年排名图

                        type: 'line', data: { labels: scLabels, datasets: [{ label: '年级排名', data: scRecords.map(r => r.gradeRank || null), borderColor: '#666', backgroundColor: 'transparent', fill: false, tension: 0, borderWidth: 1.5, pointRadius: 3, pointBackgroundColor: '#666', pointBorderColor: '#fff', pointBorderWidth: 1, borderDash: [5, 5] }] },
                        options: { responsive: false, animation: false, plugins: { legend: { display: false } }, scales: { y: { reverse: true, ticks: { stepSize: 1, callback: v => Number.isInteger(v) ? v : '', font: { size: 16 } } }, x: { ticks: { font: { size: 16 } } } } }
                    });

            // 截取总览页面的所有分类雷达图
            let radarImages = [];
            if (includeKnowledge) {

                    const labels = [];
                    const scores = [];

                selectedModules.forEach(m => m.knowledges.forEach(k => { const s = getStudentKnowledgeScore(student, k.id); const l = getKnowledgeLevel(s); if (l < counts.length) counts[l]++; }));

                html += `<h2 class="pdf-section-title">${numToChinese(sectionNum)}、知识点掌握情况</h2>`;
                html += `<div class="pdf-stats">`;
                levelConfig.forEach((cfg, i) => { html += `<div class="pdf-stat-card"><div class="pdf-stat-num">${counts[i]}</div><div class="pdf-stat-label">${cfg.name}</div></div>`; });
                html += `</div>`;

                html += `<table class="pdf-table"><thead><tr><th>模块</th><th>知识点数</th><th>平均分</th><th>掌握等级</th></tr></thead><tbody>`;
                selectedModules.forEach(m => {
                    const scores = m.knowledges.map(k => getStudentKnowledgeScore(student, k.id));
                    const avg = scores.length > 0 ? scores.reduce((a, b) => a + b, 0) / scores.length : 0;
                    html += `<tr><td>${m.name}</td><td style="text-align:center">${m.knowledges.length}</td><td style="text-align:center">${avg.toFixed(1)}</td><td style="text-align:center">${getLevelName(avg)}</td></tr>`;
                });
                html += `</tbody></table>`;
            }

            // 总览雷达图单独一页（每个分类一个）
            radarImages.forEach((radar, idx) => {
                html += `<div class="pdf-page-break"></div>`;
                html += `<div class="pdf-page-header">颜一老师教学工作室</div>`;
                html += `<div class="pdf-radar-page"><div class="pdf-radar-title">${radar.title}</div><img src="${radar.img}"></div>`;
            });

            // 学习规划
            if (includeStudyPlans) {
                sectionNum++;
                html += `<div class="pdf-page-break"></div>`;
                html += `<div class="pdf-page-header">颜一老师教学工作室</div>`;
                html += `<h2 class="pdf-section-title">${numToChinese(sectionNum)}、学习规划</h2>`;
                if (student.study_plans.length === 0) {
                    html += `<p class="pdf-empty">暂无学习规划</p>`;
                } else {
                    const statusOrder = ['进行中', '未开始', '已完成'];
                    const statusMap = {};
                    student.study_plans.forEach(plan => {
                        const status = plan.status || '未开始';
                        if (!statusMap[status]) statusMap[status] = [];
                        statusMap[status].push(plan);
                    });
                    statusOrder.forEach(status => {
                        if (statusMap[status] && statusMap[status].length > 0) {
                            html += `<div style="font-size:17px;font-weight:bold;color:#333;margin:14px 0 10px;">${status}</div>`;
                            statusMap[status].forEach(plan => {
                                html += `<div class="pdf-plan-card">
                                    <div class="pdf-plan-header">${plan.name} <span class="pdf-plan-meta">状态：${plan.status} | 进度：${plan.progress}%</span></div>
                                    <div class="pdf-plan-time">时间：${plan.startDate} ${plan.endDate}</div>
                                    <div class="pdf-plan-content">${plan.content}</div>
                                </div>`;
                            });
                        }
                    });
                }
            }

            // 出勤记录
            if (includeAttendance) {
                sectionNum++;
                const filtered = filterRecordsByQuarters(student.attendance_records, 'date', attYear, attQuarters).sort((a, b) => new Date(b.date) - new Date(a.date));
                const qLabels = attQuarters.map(q => `Q${q}`).join('、');

                html += `<div class="pdf-page-break"></div>`;
                html += `<div class="pdf-page-header">颜一老师教学工作室</div>`;
                html += `<h2 class="pdf-section-title">${numToChinese(sectionNum)}、出勤记录</h2>`;
                html += `<p class="pdf-subtitle">${attYear}年 ${qLabels}</p>`;

                if (filtered.length === 0) {
                    html += `<p class="pdf-empty">所选季度暂无出勤记录</p>`;
                } else {
                    const attStats = { '出勤': 0, '迟到': 0, '请假': 0, '缺勤': 0 };
                    filtered.forEach(r => { if (attStats.hasOwnProperty(r.status)) attStats[r.status]++; });
                    html += `<div class="pdf-stats">`;
                    Object.entries(attStats).forEach(([k, v]) => {
                        const color = k === '出勤' ? '#4caf50' : k === '迟到' ? '#2196f3' : k === '请假' ? '#ff9800' : '#f44336';
                        html += `<div class="pdf-stat-card"><div class="pdf-stat-num" style="color:${color}">${v}</div><div class="pdf-stat-label">${k}</div></div>`;
                    });
                    html += `</div>`;

                    html += `<table class="pdf-table"><thead><tr><th>日期</th><th>时段</th><th>状态</th><th>课题</th><th>反馈</th></tr></thead><tbody>`;
                    filtered.forEach(r => {
                        const color = r.status === '出勤' ? '#4caf50' : r.status === '迟到' ? '#2196f3' : r.status === '请假' ? '#ff9800' : '#f44336';
                        html += `<tr><td>${r.date}</td><td style="text-align:center">${extractTimeOnly(r.timeSlot)}</td><td style="text-align:center"><span style="color:${color};font-weight:bold">${r.status}</span></td><td>${r.topic || ''}</td><td>${r.feedback || ''}</td></tr>`;
                    });
                    html += `</tbody></table>`;
                }
            }

            // 作业记录
            if (includeHomework) {
                sectionNum++;
                const filtered = filterRecordsByQuarters(student.homework_records, 'date', hwYear, hwQuarters).sort((a, b) => new Date(b.date) - new Date(a.date));
                const qLabels = hwQuarters.map(q => `Q${q}`).join('、');

                html += `<div class="pdf-page-break"></div>`;
                html += `<div class="pdf-page-header">颜一老师教学工作室</div>`;
                html += `<h2 class="pdf-section-title">${numToChinese(sectionNum)}、作业记录</h2>`;
                html += `<p class="pdf-subtitle">${hwYear}年 ${qLabels}</p>`;

                if (filtered.length === 0) {
                    html += `<p class="pdf-empty">所选季度暂无作业记录</p>`;
                } else {
                    const hwCompleted = filtered.filter(r => r.completed === '已完成' || r.completed === '部分完成').length;
                    html += `<div class="pdf-stats">
                        <div class="pdf-stat-card"><div class="pdf-stat-num">${filtered.length}</div><div class="pdf-stat-label">总作业</div></div>
                        <div class="pdf-stat-card"><div class="pdf-stat-num" style="color:#4caf50">${hwCompleted}</div><div class="pdf-stat-label">已完成</div></div>
                        <div class="pdf-stat-card"><div class="pdf-stat-num" style="color:#f44336">${filtered.length - hwCompleted}</div><div class="pdf-stat-label">未完成</div></div>
                    </div>`;

                    html += `<table class="pdf-table"><thead><tr><th>日期</th><th>课题</th><th>完成状态</th><th>评价</th></tr></thead><tbody>`;
                    filtered.forEach(r => {
                        const color = (r.completed === '已完成' || r.completed === '部分完成') ? '#81c784' : r.completed === '进行中' ? '#64b5f6' : '#f44336';
                        html += `<tr><td>${r.date}</td><td>${r.topic || ''}</td><td style="text-align:center"><span style="color:${color};font-weight:bold">${r.completed || ''}</span></td><td>${r.evaluation || ''}</td></tr>`;
                    });
                    html += `</tbody></table>`;
                }
            }

            // 成绩记录
            if (includeScores) {
                sectionNum++;
                const filtered = filterRecordsByQuarters(student.score_records, 'date', scYear, scQuarters).sort((a, b) => new Date(b.date) - new Date(a.date));
                const qLabels = scQuarters.map(q => `Q${q}`).join('、');

                html += `<div class="pdf-page-break"></div>`;
                html += `<div class="pdf-page-header">颜一老师教学工作室</div>`;
                html += `<h2 class="pdf-section-title">${numToChinese(sectionNum)}、成绩记录</h2>`;
                html += `<p class="pdf-subtitle">${scYear}年 ${qLabels}</p>`;

                if (filtered.length === 0) {
                    html += `<p class="pdf-empty">所选季度暂无成绩记录</p>`;
                } else {
                    const avgScore = filtered.reduce((a, r) => a + r.score, 0) / filtered.length;
                    const maxScore = Math.max(...filtered.map(r => r.score));
                    const minScore = Math.min(...filtered.map(r => r.score));
                    html += `<div class="pdf-stats">
                        <div class="pdf-stat-card"><div class="pdf-stat-num">${filtered.length}</div><div class="pdf-stat-label">考试次数</div></div>
                        <div class="pdf-stat-card"><div class="pdf-stat-num">${avgScore.toFixed(1)}</div><div class="pdf-stat-label">平均分</div></div>
                        <div class="pdf-stat-card"><div class="pdf-stat-num" style="color:#4caf50">${maxScore}</div><div class="pdf-stat-label">最高分</div></div>
                        <div class="pdf-stat-card"><div class="pdf-stat-num" style="color:#f44336">${minScore}</div><div class="pdf-stat-label">最低分</div></div>
                    </div>`;

                    html += `<table class="pdf-table"><thead><tr><th>日期</th><th>考试</th><th>考试内容</th><th>难度</th><th>成绩</th><th>班级排名</th><th>年级排名</th></tr></thead><tbody>`;
                    filtered.forEach(r => {
                        html += `<tr><td>${r.date}</td><td>${r.examType || r.type || ''}</td><td>${r.scope || '-'}</td><td style="text-align:center">${r.difficulty || '-'}</td><td style="text-align:center;font-weight:bold">${r.score}</td><td style="text-align:center">${r.classRank || r.rank || '-'}${r.classTotal ? '/' + r.classTotal : ''}</td><td style="text-align:center">${r.gradeRank || '-'}${r.gradeTotal ? '/' + r.gradeTotal : ''}</td></tr>`;
                    });
                    html += `</tbody></table>`;
                }
            }

            // 分析图表 - 出勤趋势+作业完成情况 同页（已注释掉）
            // if (includeCharts && (attChartImg || hwChartImg)) {
            //     sectionNum++;
            //     html += `<div class="pdf-page-break"></div>`;
            //     html += `<div class="pdf-page-header">颜一老师教学工作室</div>`;
            //     html += `<h2 class="pdf-section-title">${numToChinese(sectionNum)}、分析图表（一）</h2>`;
            //     if (attChartImg) html += `<div class="pdf-chart"><div class="pdf-chart-title">出勤趋势</div><img src="${attChartImg}" style="max-width:70%;width:70%;max-height:260px;"></div>`;
            //     if (hwChartImg) html += `<div class="pdf-chart"><div class="pdf-chart-title">作业完成情况</div><img src="${hwChartImg}" style="max-width:45%;width:45%;"></div>`;
            // }

            // 学习总结（放到最后）
            if (includeSummary) {
                sectionNum++;
                const summaries = student.learning_summaries || [];
                const latestSummary = summaries.length > 0 ? summaries.sort((a,b) => b.date.localeCompare(a.date))[0] : null;
                const summaryText = latestSummary ? latestSummary.content : '暂无总结';
                html += `<div class="pdf-page-break"></div>`;
                html += `<div class="pdf-page-header">颜一老师教学工作室</div>`;
                html += `<h2 class="pdf-section-title">${numToChinese(sectionNum)}、学习情况总结</h2>`;
                html += `<div class="pdf-summary">${summaryText.replace(/\n/g, '<br>')}</div>`;
            }

            // 分析图表 - 成绩走势（3个图单独一页，放到最后）
            if (includeCharts && (scoreScoreImg || scoreClassRankImg || scoreGradeRankImg)) {
                sectionNum++;
                html += `<div class="pdf-page-break"></div>`;
                html += `<div class="pdf-page-header">颜一老师教学工作室</div>`;
                html += `<h2 class="pdf-section-title">${numToChinese(sectionNum)}、分析图表 - 成绩走势</h2>`;
                if (scoreScoreImg) html += `<div class="pdf-chart"><div class="pdf-chart-title">成绩变化</div><img src="${scoreScoreImg}"></div>`;
                if (scoreClassRankImg) html += `<div class="pdf-chart"><div class="pdf-chart-title">班级排名变化</div><img src="${scoreClassRankImg}"></div>`;
                if (scoreGradeRankImg) html += `<div class="pdf-chart"><div class="pdf-chart-title">年级排名变化</div><img src="${scoreGradeRankImg}"></div>`;
            }

            // 打开打印窗口
            const printWin = window.open('', '_blank');
            printWin.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>${student.name}_学情分析报告</title>
            <style>
                @page { size: A4; margin: 18mm 12mm 12mm 12mm; }
                * { margin: 0; padding: 0; box-sizing: border-box; }
                body { font-family: "Microsoft YaHei", "SimSun", sans-serif; color: #333; font-size: 18px; line-height: 1.8; padding: 0 10px; }

                .pdf-page-header { text-align: left; font-size: 14px; color: #999; border-bottom: 1px solid #ddd; padding-bottom: 4px; margin-bottom: 16px; }

                .pdf-cover { text-align: center; padding-top: 120px; page-break-after: always; }
                .pdf-cover h1 { font-size: 36px; margin-bottom: 28px; color: #000; }
                .pdf-cover .pdf-info { font-size: 18px; color: #555; margin-bottom: 14px; }
                .pdf-cover .pdf-date { font-size: 16px; color: #999; }

                .pdf-page-break { page-break-before: always; }

                .pdf-section-title { font-size: 26px; font-weight: bold; color: #000; border-bottom: 2px solid #333; padding-bottom: 8px; margin-bottom: 20px; margin-top: 0; }
                .pdf-subtitle { font-size: 16px; color: #888; margin-bottom: 16px; }
                .pdf-empty { color: #999; font-size: 17px; padding: 10px 0; }

                .pdf-stats { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
                .pdf-stat-card { background: #f5f5f5; border: 1px solid #ddd; border-radius: 6px; padding: 14px 26px; text-align: center; min-width: 100px; }
                .pdf-stat-num { font-size: 30px; font-weight: bold; color: #000; }
                .pdf-stat-label { font-size: 15px; color: #666; margin-top: 2px; }

                .pdf-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 16px; }
                .pdf-table th { background: #f0f0f0; padding: 12px 14px; text-align: left; border: 1px solid #ddd; font-weight: bold; }
                .pdf-table td { padding: 11px 14px; border: 1px solid #ddd; }

                .pdf-chart { text-align: center; margin: 20px 0; }
                .pdf-chart-title { font-size: 17px; font-weight: bold; color: #333; margin-bottom: 12px; }
                .pdf-chart img { max-width: 100%; width: 100%; height: auto; }
                .pdf-chart-row { display: flex; justify-content: space-around; align-items: flex-start; gap: 20px; margin: 20px 0; }
                .pdf-chart-row .pdf-chart { flex: 1; margin: 0; }
                .pdf-chart-row .pdf-chart img { max-width: 100%; width: 100%; }

                .pdf-radar-page { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 240mm; text-align: center; }
                .pdf-radar-page img { max-width: 100%; width: 100%; max-height: 260mm; object-fit: contain; }
                .pdf-radar-title { font-size: 24px; font-weight: bold; color: #333; margin-bottom: 16px; }

                .pdf-plan-card { background: #f9f9f9; border: 1px solid #eee; border-radius: 6px; padding: 16px; margin-bottom: 14px; }
                .pdf-plan-header { font-weight: bold; font-size: 19px; color: #000; }
                .pdf-plan-meta { font-weight: normal; font-size: 16px; color: #666; margin-left: 8px; }
                .pdf-plan-time { font-size: 16px; color: #555; margin-top: 4px; }
                .pdf-plan-content { font-size: 17px; color: #555; margin-top: 6px; line-height: 1.8; }

                .pdf-summary { font-size: 17px; color: #333; line-height: 1.8; padding: 16px; background: #f9f9f9; border: 1px solid #eee; border-radius: 6px; white-space: pre-wrap; }
            </style></head><body>
            ${html}
            <script>
                setTimeout(function(){
                    document.title = '${student.name}_${new Date().toISOString().split('T')[0]}_学情分析报告';
                    window.print();
                },800);
            <\/script>
            </body></html>`);
            printWin.document.close();
        }

        // 数字转中文
        function numToChinese(n) {
            const chars = ['零','一','二','三','四','五','六','七','八','九','十'];
            return n <= 10 ? chars[n] : n.toString();
        }

        // 点击模态框外部关闭
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // 注册 Service Worker（PWA 离线支持）
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('Service Worker 注册成功'))
                .catch(err => console.log('Service Worker 注册失败', err));
        }

        // 初始化应用
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
